name: Daily Email Agent

on:
  schedule:
    # Runs every day at 2:30 AM UTC (which is exactly 8:00 AM IST)
    - cron: '30 2 * * *'
  
  # Allows you to trigger the run manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  run-email-agent:
    runs-on: ubuntu-latest
    
    # We set a max timeout to ensure it doesn't run forever and eat up free minutes
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Email Agent
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: node index.js
